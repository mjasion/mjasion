<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="agentA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="agentB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="flowAB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="flowBA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#6366f1" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="240" y1="0" x2="240" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/>
    <line x1="960" y1="0" x2="960" y2="675"/>
  </g>

  <!-- Title -->
  <text x="600" y="118" text-anchor="middle" fill="#e2e8f0" font-size="34" font-weight="700" letter-spacing="-0.5">Two Agents, One MCP Harness</text>
  <text x="600" y="152" text-anchor="middle" fill="#94a3b8" font-size="16" font-weight="400">one builds · one audits · MCP is the contract between them</text>

  <!-- Agent A (Builder) -->
  <g transform="translate(100, 270)">
    <rect x="0" y="0" width="280" height="220" rx="18" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <g transform="translate(112, 30)">
      <circle cx="28" cy="28" r="26" fill="url(#agentA)" opacity="0.95"/>
      <text x="28" y="36" text-anchor="middle" fill="#0b1220" font-size="26" font-weight="800">A</text>
    </g>
    <text x="140" y="118" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="700">Agent A — Builder</text>
    <text x="140" y="148" text-anchor="middle" fill="#cbd5e1" font-size="13">writes the app</text>
    <text x="140" y="170" text-anchor="middle" fill="#cbd5e1" font-size="13">writes the tests</text>
    <text x="140" y="192" text-anchor="middle" fill="#cbd5e1" font-size="13">publishes MCP</text>
  </g>

  <!-- MCP Server (middle) -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="260" height="180" rx="18" fill="#1c1917" stroke="#f59e0b" stroke-width="2.4" filter="url(#glow)"/>
    <g transform="translate(102, 26)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#mcpGrad)"/>
      <text x="28" y="38" text-anchor="middle" fill="#0b1220" font-size="24" font-weight="800">M</text>
    </g>
    <text x="130" y="110" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="700">MCP Server</text>
    <text x="130" y="138" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="500">tools + descriptions</text>
    <text x="130" y="160" text-anchor="middle" fill="#fcd34d" font-size="12" opacity="0.8">= the contract under audit</text>
  </g>

  <!-- Agent B (Auditor) -->
  <g transform="translate(820, 270)">
    <rect x="0" y="0" width="280" height="220" rx="18" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(112, 30)">
      <circle cx="28" cy="28" r="26" fill="url(#agentB)" opacity="0.95"/>
      <text x="28" y="36" text-anchor="middle" fill="#0b1220" font-size="26" font-weight="800">B</text>
    </g>
    <text x="140" y="118" text-anchor="middle" fill="#6ee7b7" font-size="20" font-weight="700">Agent B — Auditor</text>
    <text x="140" y="148" text-anchor="middle" fill="#cbd5e1" font-size="13">fresh context</text>
    <text x="140" y="170" text-anchor="middle" fill="#cbd5e1" font-size="13">independent recompute</text>
    <text x="140" y="192" text-anchor="middle" fill="#cbd5e1" font-size="13">flags every divergence</text>
  </g>

  <!-- Arrows: A -> MCP -->
  <g>
    <line x1="385" y1="380" x2="465" y2="380" stroke="url(#flowAB)" stroke-width="3.5" stroke-dasharray="9,6"/>
    <polygon points="468,380 451,372 451,388" fill="#f59e0b" opacity="0.9"/>
    <text x="425" y="368" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500">exposes</text>
  </g>

  <!-- Arrows: MCP -> B -->
  <g>
    <line x1="735" y1="380" x2="815" y2="380" stroke="url(#flowBA)" stroke-width="3.5" stroke-dasharray="9,6"/>
    <polygon points="818,380 801,372 801,388" fill="#10b981" opacity="0.9"/>
    <text x="775" y="368" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500">queries</text>
  </g>

  <!-- Curved feedback loop B -> A bugs -->
  <g>
    <path d="M 960 500 Q 600 600 240 500" stroke="#10b981" stroke-width="2.2" stroke-dasharray="7,6" fill="none" opacity="0.6"/>
    <polygon points="240,500 254,492 251,506" fill="#10b981" opacity="0.85"/>
    <text x="600" y="595" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="500">divergences feed back as the bug list</text>
  </g>
</svg>
